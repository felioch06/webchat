name: Aido PR Assistant

on:
  issue_comment:
    types: [created]

jobs:
  aido:
    if: contains(github.event.comment.body, 'aido')
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Run Aido
        uses: aido-dev/aido-action@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          provider: ollama
          model: llama3
